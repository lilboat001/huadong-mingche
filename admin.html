<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>衢州华东名车 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;color:#333}
.bar{background:linear-gradient(135deg,#1a1a2e,#c1121f);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.bar h1{font-size:17px;display:flex;align-items:center;gap:8px}
.bar a{color:#fff;text-decoration:none;font-size:12px;opacity:.8}
.main{max-width:1200px;margin:0 auto;padding:14px;display:grid;grid-template-columns:370px 1fr;gap:14px}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.05);padding:16px;margin-bottom:12px}
.panel h2{font-size:15px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e63946}
.row{margin-bottom:8px}
.row label{display:block;font-size:11px;font-weight:500;color:#555;margin-bottom:2px}
.row input,.row select,.row textarea{width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:5px;font-size:13px;font-family:inherit}
.row input:focus,.row select:focus,.row textarea:focus{outline:none;border-color:#e63946}
.row textarea{resize:vertical;min-height:50px}
.inline{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn{padding:8px 16px;border:none;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer}
.btn-red{background:#e63946;color:#fff;width:100%;margin-top:4px}
.btn-red:hover{background:#c1121f}
.btn-out{background:#fff;border:1px solid #ddd;color:#555}
.btn-out:hover{background:#f5f5f5}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-del{background:#ff4444;color:#fff;padding:3px 8px;font-size:10px;border:none;border-radius:4px;cursor:pointer}
.btn-del:hover{background:#c00}
.toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:7px 5px;text-align:left;border-bottom:1px solid #eee}
th{background:#fafafa;font-weight:600;color:#555;font-size:10px}
tr:hover td{background:#fafafa}
.thumb{width:50px;height:32px;object-fit:cover;border-radius:3px;background:#eee}
.nodata{text-align:center;padding:40px;color:#999}
.toast{position:fixed;top:14px;right:14px;background:#333;color:#fff;padding:10px 16px;border-radius:7px;font-size:12px;z-index:999;opacity:0;transition:.3s}
.toast.on{opacity:1}
.toast.ok{background:#27ae60}
.stats{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.stats span{background:#f0f2f5;padding:5px 12px;border-radius:5px;font-size:11px}
.stats strong{color:#e63946}
.s3d{border:2px dashed #ddd;border-radius:7px;margin-top:8px;overflow:hidden}
.s3d-head{padding:9px 12px;background:#fafafa;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;user-select:none}
.s3d-body{padding:12px}
.s3d-body .hint{font-size:10px;color:#888;margin-bottom:8px}
.angles{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.angles .row label{font-size:10px}
.angles .row input{padding:5px 7px;font-size:11px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9999;flex-direction:column}
.modal .mbar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#1a1a2e;color:#fff}
.modal .mclose{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.modal .mbody{flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
.modal .mwrap{max-width:780px;width:100%;background:#fff;border-radius:10px;overflow:hidden}
.modal .mfoot{text-align:center;padding:6px;color:#aaa;font-size:10px}
.sv{width:100%;padding-top:56.25%;position:relative;overflow:hidden;cursor:grab;background:#fff}
.sv:active{cursor:grabbing}
.sv img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none;background:#fff}
.sv .hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.45);color:#fff;padding:2px 10px;border-radius:8px;font-size:10px}
.sv .prog{position:absolute;bottom:0;left:0;height:3px;background:#e63946}
.sv-ctrl{display:flex;justify-content:center;gap:10px;padding:7px;background:#fafafa;border-top:1px solid #eee}
.sv-ctrl button{background:#fff;border:1px solid #ddd;border-radius:50%;width:30px;height:30px;font-size:13px;cursor:pointer}
.sv-ctrl button:hover{background:#e63946;color:#fff;border-color:#e63946}
.sv-ctrl .autobtn{border-radius:12px;width:auto;padding:0 10px;font-size:10px}
.sv-ctrl .autobtn.play{background:#e63946;color:#fff;border-color:#e63946}
</style>
</head>
<body>

<!-- 密码门禁 -->
<div id="pwGate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,26,46,.98);z-index:99999;display:flex;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:36px 28px;text-align:center;width:340px;box-shadow:0 10px 40px rgba(0,0,0,.5)">
    <div style="font-size:44px;margin-bottom:12px">🔐</div>
    <h2 style="margin-bottom:6px;font-size:18px">管理后台登录</h2>
    <p style="color:#888;font-size:12px;margin-bottom:16px">衢州华东名车</p>
    <input type="password" id="pwInput" placeholder="请输入密码" style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:8px;font-size:15px;text-align:center;margin-bottom:8px" onkeydown="if(event.key==='Enter')checkPw()">
    <p id="pwErr" style="color:#e63946;font-size:11px;margin-bottom:8px;display:none">密码错误</p>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#e63946;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600">进入后台</button>
  </div>
</div>

<header class="bar">
  <h1><img src="images/logo.png" alt="logo" style="height:26px" onerror="this.style.display='none'"> 🚗 衢州华东名车 · 管理后台</h1>
  <div style="display:flex;gap:14px;align-items:center">
    <span style="font-size:11px;opacity:.8" id="hdr"></span>
    <a href="index.html" target="_blank">👁 展示网站 →</a>
  </div>
</header>

<div class="main">

<div>
  <div class="panel">
    <h2 id="ftitle">➕ 添加车辆</h2>
    <form id="cform" autocomplete="off">
    <input type="hidden" id="cid">
    <div class="inline"><div class="row"><label>品牌 *</label><input id="brand" placeholder="如：丰田" required></div><div class="row"><label>型号 *</label><input id="model" placeholder="如：卡罗拉" required></div></div>
    <div class="inline"><div class="row"><label>年份</label><input type="number" id="year" placeholder="2022" min="2000" max="2030"></div><div class="row"><label>价格(元) *</label><input type="number" id="price" placeholder="88000" required></div></div>
    <div class="inline"><div class="row"><label>里程(万km)</label><input type="number" id="mileage" placeholder="3.2" step="0.1"></div><div class="row"><label>变速箱</label><select id="trans"><option value="自动">自动</option><option value="手动">手动</option></select></div></div>
    <div class="inline"><div class="row"><label>燃料</label><select id="fuel"><option value="汽油">汽油</option><option value="纯电动">纯电动</option><option value="插电混动">插电混动</option><option value="柴油">柴油</option></select></div><div class="row"><label>排量</label><input id="disp" placeholder="1.8L"></div></div>
    <div class="inline"><div class="row"><label>颜色</label><input id="color" placeholder="白色"></div><div class="row"><label>所在地</label><input id="loc" value="衢州"></div></div>
    <div class="row"><label>主图URL *</label><input type="url" id="img1" placeholder="https://... 图片链接" required></div>
    <div class="row"><label>附图URL</label><input type="url" id="img2" placeholder="https://... 可选"></div>
    <div class="row"><label>电话</label><input id="phone" value="15967800642"></div>
    <div class="row"><label>描述</label><textarea id="desc" placeholder="车况描述..."></textarea></div>

    <!-- 3D -->
    <div class="s3d">
      <div class="s3d-head" onclick="toggle3D()">
        <span>🔄 3D旋转展示设置</span>
        <span style="font-size:10px;color:#888" id="s3dArr">展开 ▼</span>
      </div>
      <div class="s3d-body" id="s3dBody" style="display:none">
        <div class="hint">💡 相机固定，车每转45°拍一张，上传图床后粘贴链接</div>
        <div class="angles" id="angWrap"></div>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <label style="font-size:11px;cursor:pointer"><input type="checkbox" id="s3dOn"> 启用3D展示</label>
          <button type="button" class="btn btn-out btn-sm" onclick="preview3D()">👁 预览3D</button>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:6px;margin-top:8px">
      <button type="submit" class="btn btn-red" id="sbtn">✅ 保存车辆</button>
      <button type="button" class="btn btn-out" id="cbtn" style="display:none">取消</button>
    </div>
    </form>
  </div>
  <div class="panel" style="font-size:11px;color:#888">
    💡 把照片上传到 <a href="https://imgse.com" target="_blank">imgse.com</a>，复制链接粘贴
  </div>
</div>

<div>
  <div class="panel">
    <div class="stats" id="stats"></div>
    <div class="toolbar">
      <button class="btn btn-out btn-sm" onclick="doReset()">⚠️ 恢复默认</button>
      <button class="btn btn-out btn-sm" onclick="doExport()">📥 导出</button>
      <button class="btn btn-out btn-sm" onclick="document.getElementById('impFile').click()">📤 导入</button>
      <input type="file" id="impFile" accept=".json" style="display:none" onchange="doImport(event)">
      <button class="btn btn-sm" style="background:#2ea44f;color:#fff" onclick="doPublish()">🚀 发布到网站</button>
    </div>
    <div id="pubStatus" style="font-size:11px;color:#888;margin-top:4px"></div>
    <table><thead><tr><th>图</th><th>品牌</th><th>型号</th><th>年</th><th>价格</th><th>里程</th><th>3D</th><th>地</th><th>操作</th></tr></thead>
    <tbody id="tbody"></tbody></table>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<!-- 3D预览弹窗 -->
<div class="modal" id="modal3d">
  <div class="mbar"><span>🔄 3D旋转预览</span><button class="mclose" onclick="document.getElementById('modal3d').style.display='none'">✕</button></div>
  <div class="mbody"><div class="mwrap" id="modalWrap"></div></div>
  <div class="mfoot">↔ 拖拽鼠标旋转 | 白色背景</div>
</div>

<script src="js/app.js"></script>
<script>
// ===== 全局变量 =====
var cars = [];
var editId = null;
var angles = ['正前方','右前45°','右侧','右后45°','正后方','左后45°','左侧','左前45°'];
var STORAGE = 'car_inventory';

// ===== 生成角度输入框 =====
(function(){
  var h='';
  angles.forEach(function(a,i){
    h+='<div class="row"><label>📷 '+a+'</label><input type="url" class="s3dinp" data-idx="'+i+'" placeholder="'+a+'"></div>';
  });
  document.getElementById('angWrap').innerHTML=h;
})();

// ===== 3D展开 =====
function toggle3D(){
  var b=document.getElementById('s3dBody');
  var open=b.style.display!=='none';
  b.style.display=open?'none':'';
  document.getElementById('s3dArr').textContent=open?'展开 ▼':'收起 ▲';
}

// ===== Toast =====
function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m;el.className='toast on'+(t?' '+t:'');
  setTimeout(function(){el.className='toast'},2500);
}

// ===== 数据 =====
function loadData(){
  var s=localStorage.getItem(STORAGE);
  if(s){try{cars=JSON.parse(s)}catch(e){cars=[]}}
  else{cars=JSON.parse(JSON.stringify(window.CAR_DATA||[]))}
  // 演示3D
  var has=cars.some(function(c){return c.spin3d&&c.spin3d.enabled;});
  if(!has&&cars.length>0){
    cars[0].spin3d={enabled:true,images:[
      "https://images.unsplash.com/photo-1523983388277-336a66bf9bcd?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1555215695-3004980ad54e?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1599912027765-a69c78bfa3aa?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1619021897566-a5f30301fdb8?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1592309905620-e5b59f6dcb98?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1570303278489-041bd897a873?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1578659258511-4a4e7dee7344?w=800&h=600&fit=crop",
      "https://images.unsplash.com/photo-1575501707067-0e4c7db2a950?w=800&h=600&fit=crop"
    ]};
  }
  saveData();
}
function saveData(){localStorage.setItem(STORAGE,JSON.stringify(cars))}

// ===== 表格 =====
function renderTable(){
  var tb=document.getElementById('tbody');
  if(!cars.length){tb.innerHTML='<tr><td colspan="9" class="nodata">暂无车辆</td></tr>'}
  else{
    tb.innerHTML=cars.map(function(c){
      var p=(c.price/10000).toFixed(2);
      return'<tr>'+
        '<td><img src="'+(c.images[0]||'')+'" class="thumb" onerror="this.style.display=\'none\'"></td>'+
        '<td>'+c.brand+'</td><td>'+c.model+'</td><td>'+(c.year||'')+'</td>'+
        '<td><strong>'+p+'万</strong></td><td>'+(c.mileage||'')+'万km</td>'+
        '<td>'+(c.spin3d&&c.spin3d.enabled?'<span style="background:#e63946;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px">3D</span>':'-')+'</td>'+
        '<td>'+(c.location||'')+'</td>'+
        '<td><button class="btn btn-out btn-sm" onclick="editCar('+c.id+')">✏️</button> <button class="btn-del" onclick="delCar('+c.id+')">🗑</button></td>'+
      '</tr>';
    }).join('');
  }
  var brands=new Set(cars.map(function(c){return c.brand})).size;
  var total=cars.reduce(function(s,c){return s+c.price},0);
  var avg=cars.length?Math.round(total/cars.length/10000):0;
  document.getElementById('stats').innerHTML='<span>总计 <strong>'+cars.length+'</strong> 辆</span><span><strong>'+brands+'</strong> 品牌</span><span>均价 <strong>'+avg+'</strong> 万</span>';
  document.getElementById('hdr').textContent='库存：'+cars.length+' 辆';
}

// ===== 表单 =====
document.getElementById('cform').addEventListener('submit',function(e){
  e.preventDefault();
  var urls=[];
  document.querySelectorAll('.s3dinp').forEach(function(inp){if(inp.value.trim())urls.push(inp.value.trim())});
  var car={
    id:editId||Date.now(),
    brand:document.getElementById('brand').value.trim(),
    model:document.getElementById('model').value.trim(),
    year:parseInt(document.getElementById('year').value)||new Date().getFullYear(),
    price:parseInt(document.getElementById('price').value)||0,
    mileage:parseFloat(document.getElementById('mileage').value)||0,
    transmission:document.getElementById('trans').value,
    fuel:document.getElementById('fuel').value,
    displacement:document.getElementById('disp').value.trim(),
    color:document.getElementById('color').value.trim(),
    location:document.getElementById('loc').value.trim(),
    images:[document.getElementById('img1').value.trim()],
    contact:document.getElementById('phone').value.trim(),
    description:document.getElementById('desc').value.trim()
  };
  if(document.getElementById('img2').value.trim())car.images.push(document.getElementById('img2').value.trim());
  if(urls.length>=4&&document.getElementById('s3dOn').checked)car.spin3d={enabled:true,images:urls};
  if(!car.brand||!car.model||!car.price||!car.images[0]){toast('请填写品牌、型号、价格和主图URL');return}
  if(editId){var i=cars.findIndex(function(c){return c.id===editId});if(i>=0)cars[i]=car;toast('已更新','ok')}
  else{cars.unshift(car);toast('已添加','ok')}
  saveData();renderTable();resetForm();
});

function editCar(id){
  var c=cars.find(function(x){return x.id===id});if(!c)return;
  editId=id;document.getElementById('cid').value=id;
  document.getElementById('brand').value=c.brand;
  document.getElementById('model').value=c.model;
  document.getElementById('year').value=c.year||'';
  document.getElementById('price').value=c.price;
  document.getElementById('mileage').value=c.mileage||'';
  document.getElementById('trans').value=c.transmission||'自动';
  document.getElementById('fuel').value=c.fuel||'汽油';
  document.getElementById('disp').value=c.displacement||'';
  document.getElementById('color').value=c.color||'';
  document.getElementById('loc').value=c.location||'衢州';
  document.getElementById('img1').value=c.images[0]||'';
  document.getElementById('img2').value=c.images[1]||'';
  document.getElementById('phone').value=c.contact||'15967800642';
  document.getElementById('desc').value=c.description||'';
  document.getElementById('s3dOn').checked=!!(c.spin3d&&c.spin3d.enabled);
  var u=(c.spin3d&&c.spin3d.images)?c.spin3d.images:[];
  document.querySelectorAll('.s3dinp').forEach(function(inp,i){inp.value=u[i]||''});
  if(u.length>0){document.getElementById('s3dBody').style.display='';document.getElementById('s3dArr').textContent='收起 ▲'}
  document.getElementById('ftitle').textContent='✏️ 编辑车辆';
  document.getElementById('sbtn').textContent='💾 更新车辆';
  document.getElementById('cbtn').style.display='';
  window.scrollTo({top:0,behavior:'smooth'});
}

function delCar(id){
  if(!confirm('确定删除？'))return;
  cars=cars.filter(function(c){return c.id!==id});
  saveData();renderTable();toast('已删除','ok');
}

function resetForm(){
  editId=null;document.getElementById('cid').value='';
  document.getElementById('cform').reset();
  document.getElementById('loc').value='衢州';
  document.getElementById('trans').value='自动';
  document.getElementById('fuel').value='汽油';
  document.getElementById('phone').value='15967800642';
  document.getElementById('s3dOn').checked=false;
  document.querySelectorAll('.s3dinp').forEach(function(inp){inp.value=''});
  document.getElementById('s3dBody').style.display='none';
  document.getElementById('s3dArr').textContent='展开 ▼';
  document.getElementById('ftitle').textContent='➕ 添加车辆';
  document.getElementById('sbtn').textContent='✅ 保存车辆';
  document.getElementById('cbtn').style.display='none';
}
document.getElementById('cbtn').addEventListener('click',resetForm);

function doReset(){
  if(!confirm('确定恢复默认数据？添加的车辆将被清除。'))return;
  localStorage.removeItem(STORAGE);
  loadData();renderTable();resetForm();toast('已恢复','ok');
}

function doExport(){
  var b=new Blob([JSON.stringify(cars,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='cars_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('已导出','ok');
}

function doImport(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(!Array.isArray(d))throw new Error();
      if(!confirm('导入'+d.length+'辆车，覆盖当前？'))return;
      cars=d;saveData();renderTable();toast('已导入'+d.length+'辆','ok');
    }catch(err){toast('格式错误')}
  };
  r.readAsText(f);e.target.value='';
}

// ===== 3D预览 =====
function preview3D(){
  var urls=[];
  document.querySelectorAll('.s3dinp').forEach(function(inp){if(inp.value.trim())urls.push(inp.value.trim())});
  if(urls.length<4){toast('请至少填4张角度照片');return}
  document.getElementById('modal3d').style.display='flex';
  createSpin(document.getElementById('modalWrap'),urls);
}

function createSpin(wrap,urls){
  var cur=0,timer=null;
  wrap.innerHTML='<div class="sv" id="sv"><img src="'+urls[0]+'" id="svImg" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect fill=%22%23fff%22 width=%22400%22 height=%22300%22/%3E%3Ctext x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%23aaa%22%3E图%3C/text%3E%3C/svg%3E\'"><div class="hint">↔ 拖拽旋转</div><div class="prog" style="width:'+(100/urls.length)+'%"></div></div><div class="sv-ctrl"><button onclick="S.p()">◀</button><button class="autobtn" id="abtn" onclick="S.a()">▶ 自动旋转</button><button onclick="S.n()">▶</button></div>';

  function upd(i){cur=((i%urls.length)+urls.length)%urls.length;var im=document.getElementById('svImg');var pg=document.querySelector('#sv .prog');if(im)im.src=urls[cur];if(pg)pg.style.width=((cur+1)/urls.length*100)+'%'}
  function sa(){if(timer){clearInterval(timer);timer=null;var b=document.getElementById('abtn');if(b){b.textContent='▶ 自动旋转';b.classList.remove('play')}}}
  window.S={p:function(){upd(cur-1);sa()},n:function(){upd(cur+1);sa()},a:function(){var b=document.getElementById('abtn');if(timer){sa();return}b.textContent='⏸ 停止';b.classList.add('play');timer=setInterval(function(){upd(cur+1)},150)}};

  var sv=document.getElementById('sv'),hint=sv.querySelector('.hint');
  var drag=false,sx=0,sf=0;
  sv.addEventListener('mousedown',function(e){drag=true;sx=e.clientX;sf=cur;sv.style.cursor='grabbing';hint.style.opacity='0';sa();e.preventDefault()});
  document.addEventListener('mousemove',function(e){if(!drag)return;upd(sf+Math.round((e.clientX-sx)/12))});
  document.addEventListener('mouseup',function(){if(drag){drag=false;sv.style.cursor='grab'}});
  sv.addEventListener('touchstart',function(e){drag=true;sx=e.touches[0].clientX;sf=cur;hint.style.opacity='0';sa()});
  sv.addEventListener('touchmove',function(e){if(!drag)return;upd(sf+Math.round((e.touches[0].clientX-sx)/12))});
  sv.addEventListener('touchend',function(){drag=false});
}

// ===== 发布到 GitHub =====
function doPublish(){
  var token = localStorage.getItem('gh_token');
  if (!token) {
    token = prompt('首次发布需要 GitHub Token。\n\n请粘贴你的 Token（之前创建的那个 ghp_... 开头的）：');
    if (!token || !token.startsWith('ghp_')) { toast('Token 无效，应以 ghp_ 开头'); return; }
    localStorage.setItem('gh_token', token);
  }

  var status = document.getElementById('pubStatus');
  status.textContent = '⏳ 正在发布...';

  // 生成新的 app.js 内容
  var newData = '// ========== 二手车数据 ==========\n// 注意：如果浏览器 localStorage 有 car_inventory 数据，网页会优先使用 localStorage 的数据\nvar CAR_DATA = ' + JSON.stringify(cars, null, 2) + ';\n';

  // Base64 encode
  var content = btoa(unescape(encodeURIComponent(newData)));

  // 先获取当前文件的 SHA
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.github.com/repos/lilboat001/huadong-mingche/contents/js/app.js', true);
  xhr.setRequestHeader('Authorization', 'token ' + token);
  xhr.setRequestHeader('Accept', 'application/vnd.github.v3+json');

  xhr.onload = function(){
    if (xhr.status === 401 || xhr.status === 403) {
      localStorage.removeItem('gh_token');
      status.textContent = '❌ Token 已失效，请重新发布';
      toast('Token 失效，需要重新输入');
      return;
    }
    if (xhr.status !== 200) {
      status.textContent = '❌ 网络错误: ' + xhr.status;
      toast('发布失败: ' + xhr.status);
      return;
    }

    var resp = JSON.parse(xhr.responseText);
    var sha = resp.sha;

    // 提交更新
    var body = JSON.stringify({
      message: '更新车辆数据 [' + new Date().toLocaleDateString('zh-CN') + ']',
      content: content,
      sha: sha,
      branch: 'master'
    });

    var put = new XMLHttpRequest();
    put.open('PUT', 'https://api.github.com/repos/lilboat001/huadong-mingche/contents/js/app.js', true);
    put.setRequestHeader('Authorization', 'token ' + token);
    put.setRequestHeader('Accept', 'application/vnd.github.v3+json');
    put.setRequestHeader('Content-Type', 'application/json');

    put.onload = function(){
      if (put.status === 201 || put.status === 200) {
        status.textContent = '✅ 已发布！网站将在 1-2 分钟内自动更新';
        toast('发布成功！', 'ok');
      } else if (put.status === 401 || put.status === 403) {
        localStorage.removeItem('gh_token');
        status.textContent = '❌ Token 权限不足';
        toast('Token 权限不足');
      } else {
        status.textContent = '❌ 发布失败: ' + put.status;
        try {
          var err = JSON.parse(put.responseText);
          toast('失败: ' + (err.message || put.status));
        } catch(e) { toast('发布失败: ' + put.status); }
      }
    };
    put.onerror = function(){
      status.textContent = '❌ 网络错误';
      toast('网络错误，请重试');
    };
    put.send(body);
  };
  xhr.onerror = function(){
    status.textContent = '❌ 无法连接 GitHub';
    toast('网络错误，请检查网络');
  };
  xhr.send();
}
